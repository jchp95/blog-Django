{% extends 'index.html' %}


{% block content %}
<body>
    <div class="container-register-login">
        <div class="container-card-register-login">
            <div class="card-body-login">
                <h2 class="card-title">Iniciar Sesión</h2>
                {% if messages %}
                    <ul class="message-list">
                    {% for message in messages %}
                        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
                    {% endfor %}
                    </ul>
                {% endif %}
       
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group-login">
                        <label for="id_username">Nombre de usuario:</label>
                        <input type="text" name="username" id="id_username" class="form-control" required placeholder="Ingresa tu nombre de usuario">
                    </div>
                    <div class="form-group-login">
                        <label for="id_password">Contraseña:</label>
                        <input type="password" name="password" id="id_password" class="form-control" required placeholder="Ingresa tu contraseña">
                    </div>
                    {% if error %}
                        <p class="error-message">{{ error }}</p>
                    {% endif %}
                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>
            </div>
        </div>
    </div>
</body>
{% endblock %}
