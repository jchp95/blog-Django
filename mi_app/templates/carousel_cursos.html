{% load static %}
<div class="Container-carousel">
  <a href="{% url 'cursos' %}" class="title-carousel">Available courses</a>
  <h6 class="h-subtitle">Explore our available courses to enhance your skills and advance your career</h6>
</div>
<div class="carousel">
  <div id="carouselExampleInterval" class="carousel slide carousel-fade" data-bs-ride="carousel">
    <div class="carousel-inner">
      {% for items_cursos in carousel_cursos %}
      <div class="carousel-item {% if forloop.first %}active{% endif %}" data-bs-interval="5000">
        <img src="{{ items_cursos.image.url }}" class="d-block w-100" alt="{{ item.title }}">
      </div>
      {% endfor %}
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
